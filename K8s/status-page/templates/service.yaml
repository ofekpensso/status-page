# This Service provides a stable internal IP for the pods.
# The ALB will route external traffic to this Service.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
  labels:
    app: status-page
spec:
  type: ClusterIP
  selector:
    app: status-page
  ports:
    - port: 80
      targetPort: {{ .Values.service.port }}
      protocol: TCP