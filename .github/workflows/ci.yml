name: CI Pipeline

on: [push]

env:
  PYTHON_VERSION: '3.10'
  # הנתיב כאן הוא יחסי לתיקיית העבודה (working-directory) שנגדיר למטה
  REQUIREMENTS_FILE: 'app/requirements.txt' 
  CHECK_COMMAND: 'python manage.py check'
  # המשתנים הללו יימשכו מה-Secrets של GitHub ברגע שתגדיר אותם שם
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # הגדרת תיקיית העבודה המדויקת לפי המבנה ב-Repo שלך
    defaults:
      run:
        working-directory: ./app/statuspage

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.REQUIREMENTS_FILE }}

      - name: Run System Checks
        run: ${{ env.CHECK_COMMAND }}
