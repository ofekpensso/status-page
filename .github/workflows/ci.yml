name: CI Pipeline

on: [push]

env:
  PYTHON_VERSION: '3.10'
  REQUIREMENTS_FILE: 'requirements.txt'
  CHECK_COMMAND: 'python manage.py check'
  
  # הערה: כאן אנחנו מגדירים את המשתנים עבור הסיסמאות.
  # במקום לכתוב את הסיסמה כאן, אנחנו שואבים אותה בצורה מאובטחת
  # מתוך הגדרות ה-Repository ב-GitHub (תחת Settings -> Secrets).
  # כשתהיה לכם סיסמה, פשוט תוסיפו אותה לשם והקובץ הזה ישתמש בה אוטומטית.
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.REQUIREMENTS_FILE }}

      - name: Run System Checks
        # בשלב הזה הפקודה תוכל לרוץ מבלי לקרוס, כי היא תכיר את משתני הסביבה (env) של הסיסמאות שהגדרנו למעלה
        run: ${{ env.CHECK_COMMAND }}
