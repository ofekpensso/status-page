name: CI Pipeline

on: [push]

env:
  PYTHON_VERSION: '3.10'
  # מכיוון שאנחנו מגדירים למטה שרצים בתוך תיקיית app, הנתיב כאן הוא יחסי אליה
  REQUIREMENTS_FILE: 'requirements.txt' 
  CHECK_COMMAND: 'python manage.py check'
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # כאן הקסם קורה: הגדרה שכל פקודות ה-run ב-Job הזה ירוצו בתוך תיקיית app
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # אנחנו צריכים שה-checkout יביא את כל ה-Repo (כולל תיקיית ה-root)
          # אבל הפקודות הבאות ירוצו בתוך app בזכות ה-defaults למעלה
          path: '.' 

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.REQUIREMENTS_FILE }}

      - name: Run System Checks
        run: ${{ env.CHECK_COMMAND }}
