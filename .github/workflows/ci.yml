name: CI Pipeline

on: [push]

env:
  PYTHON_VERSION: '3.10'
  REQUIREMENTS_FILE: '../requirements.txt' 
  CHECK_COMMAND: 'python manage.py check'
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app/statuspage

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Prepare Configuration File 📄
        run: |
          cp statuspage/configuration_example.py statuspage/configuration.py
          # הזרקת מפתח זמני וגם הגדרת שרת Redis מקומי לבדיקה
          sed -i "s/SECRET_KEY = ''/SECRET_KEY = 'ci-testing-key-123'/" statuspage/configuration.py

      - name: Set up Python ${{ env.PYTHON_VERSION }} 🐍
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies 🛠️
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ${{ env.REQUIREMENTS_FILE }}
          # בדיקה אם הספרייה באמת מותקנת וזמינה לייבוא
          python -c "import rq_scheduler; print('RQ Scheduler is installed!')"

      - name: Run System Checks ✅
        run: ${{ env.CHECK_COMMAND }}
