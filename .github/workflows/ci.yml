name: CI Pipeline

on: [push]

env:
  PYTHON_VERSION: '3.10'
  # הנתיב לקובץ ה-Requirements יחסי ל-working-directory שנגדיר למטה
  REQUIREMENTS_FILE: 'app/requirements.txt' 
  CHECK_COMMAND: 'python manage.py check'
  # המשתנים האלו יישאבו מה-Secrets של GitHub (כשנגדיר אותם)
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        # כל הפקודות ירוצו בתוך התיקייה שבה נמצא manage.py
        working-directory: ./app/statuspage

    steps:
      - name: Checkout Repository 
        uses: actions/checkout@v4

      - name: Prepare Configuration File 📄
        # כאן אנחנו פותרים את בעיית הקובץ החסר
        run: |
          # 1. מעתיקים את תבנית הדוגמה לקובץ שהאפליקציה מחפשת
          cp statuspage/configuration_example.py statuspage/configuration.py
          # 2. מחליפים את ה-SECRET_KEY הריק במפתח זמני לבדיקה
          sed -i "s/SECRET_KEY = ''/SECRET_KEY = 'ci-testing-key-123'/" statuspage/configuration.py

      - name: Set up Python ${{ env.PYTHON_VERSION }} 🐍
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies 🛠️
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.REQUIREMENTS_FILE }}

      - name: Run System Checks ✅
        run: ${{ env.CHECK_COMMAND }}
