name: CI Pipeline

on: [push]

env:
  PYTHON_VERSION: '3.10'
  # יוצאים מתיקיית statuspage כדי למצוא את הקובץ בתיקיית app
  REQUIREMENTS_FILE: '../requirements.txt' 
  CHECK_COMMAND: 'python manage.py check'
  # המשתנים הללו יימשכו מה-Secrets של GitHub ברגע שתגדיר אותם
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # הגדרת שירותים חיצוניים שירוצו ברקע 🐳
    services:
      redis:
        image: redis:alpine
        ports:
          - 6379:6379

    defaults:
      run:
        # ה-Runner עובד מתוך התיקייה שבה נמצא manage.py 🏠
        working-directory: ./app/statuspage

    steps:
      - name: Checkout Repository 📂
        uses: actions/checkout@v4

      - name: Prepare Configuration File 📄
        run: |
          # העתקת קובץ הדוגמה לקובץ הגדרות פעיל
          cp statuspage/configuration_example.py statuspage/configuration.py
          # הזרקת מפתח סודי זמני לצורך הבדיקה
          sed -i "s/SECRET_KEY = ''/SECRET_KEY = 'ci-testing-key-123'/" statuspage/configuration.py

      - name: Set up Python ${{ env.PYTHON_VERSION }} 🐍
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies 🛠️
        run: |
          python -m pip install --upgrade pip
          # תיקון התאימות: התקנת גרסה שתומכת ב-rq.compat
          python -m pip install "rq<1.11"
          # התקנת שאר הספריות מהקובץ
          python -m pip install -r ${{ env.REQUIREMENTS_FILE }}

      - name: Run System Checks ✅
        run: ${{ env.CHECK_COMMAND }}

